version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    labels:
      - "type: maintenance"
      - "area: dependencies"
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Berlin
    labels:
      - "type: maintenance"
      - "area: ci"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Berlin
    labels:
      - "type: maintenance"
      - "area: docker"
    open-pull-requests-limit: 3
