name: "🐛 Bug report"
description: Report a reproducible problem with the bot, admin panel, or deployment
title: "[Bug]: "
labels:
  - "type: bug"
  - "status: needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Remove tokens, API keys, private messages, recordings,
        usernames, and database contents before submitting.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I removed all credentials and personal data.
          required: true
        - label: This is not a security vulnerability.
          required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Telegram bot
        - Gemini transcription or summary
        - Queue, retries, or flood control
        - SQLite storage or migrations
        - Admin panel
        - Docker or deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the actual behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the bot with ...
        2. Send ...
        3. Run ...
        4. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v1.2.0 or commit SHA
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose (local build)
        - Docker Compose (GHCR image)
        - Direct Python
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, Docker/Python version, and relevant configuration names.
      placeholder: Ubuntu 24.04, amd64, Docker 28, Python 3.12
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Paste only the smallest relevant excerpt. Remove secrets and personal data.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots are welcome after private information has been removed.
